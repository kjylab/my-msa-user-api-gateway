name: CI

on:
  push:
    branches: [main]

env:
  BASE_URL: http://kt-cloud-nlb-4cc74b5956284fbb.elb.ap-northeast-2.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Containerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-msa-user-api-gateway:${{ github.sha }}

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: kjylab/my-msa-manifest-values
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tag
        run: |
          cd user-api-gateway
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" values-release.yaml

      - name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Update image tag to ${{ github.sha }}"
          git pull --rebase
          git push origin main

  e2e:
    needs: update-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Wait for gateway to be ready
        run: |
          BASE_URL="http://kt-cloud-nlb-4cc74b5956284fbb.elb.ap-northeast-2.amazonaws.com"
          echo "Waiting for gateway health..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/healthz")
            if [ "$STATUS" = "200" ]; then
              echo "Gateway ready (attempt $i)"
              break
            fi
            echo "Attempt $i/20: status=$STATUS, retrying in 15s..."
            sleep 15
          done

      - name: Run E2E tests
        run: |
          newman run tests/troica.postman_collection.json \
            --environment tests/troica.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export e2e-report.html \
            --reporter-htmlextra-title "E2E ${{ github.sha }}"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.sha }}
          path: e2e-report.html
          retention-days: 7
