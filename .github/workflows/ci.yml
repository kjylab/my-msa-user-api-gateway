name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  id-token: write
  contents: read

env:
  BASE_URL: ${{ secrets.BASE_URL }}

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew check --no-daemon

      - name: SonarCloud scan
        if: vars.SONARCLOUD_ENABLED == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon

  build-and-push:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Containerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-msa-user-api-gateway:${{ github.sha }}

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: kjylab/my-msa-manifest-values
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tag
        run: |
          cd user-api-gateway
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" values-release.yaml

      - name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update image tag to ${{ github.sha }}"
          git pull --rebase
          git push origin main

  e2e:
    needs: update-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Wait for gateway to be ready
        id: health
        run: |
          echo "Waiting for gateway health at $BASE_URL ..."
          READY=false
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$BASE_URL/healthz" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Gateway ready (attempt $i)"
              READY=true
              break
            fi
            echo "Attempt $i/20: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          if [ "$READY" = "false" ]; then
            echo "SKIP_E2E=true" >> $GITHUB_OUTPUT
            echo "::warning::Gateway unreachable — skipping E2E tests"
          fi

      - name: Run E2E tests
        if: steps.health.outputs.SKIP_E2E != 'true'
        run: |
          newman run tests/troica.postman_collection.json \
            --environment tests/troica.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export e2e-report.html \
            --reporter-htmlextra-title "E2E ${{ github.sha }}"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.sha }}
          path: e2e-report.html
          retention-days: 7
