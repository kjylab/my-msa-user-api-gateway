name: E2E

on:
  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Wait for gateway to be ready
        id: health
        run: |
          BASE_URL="${{ secrets.BASE_URL }}"
          echo "Waiting for gateway health at $BASE_URL ..."
          READY=false
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$BASE_URL/healthz" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Gateway ready (attempt $i)"
              READY=true
              break
            fi
            echo "Attempt $i/20: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          if [ "$READY" = "false" ]; then
            echo "SKIP_E2E=true" >> $GITHUB_OUTPUT
            echo "::warning::Gateway unreachable — skipping E2E tests"
          fi

      - name: Run E2E tests
        if: steps.health.outputs.SKIP_E2E != 'true'
        run: |
          newman run tests/troica.postman_collection.json \
            --environment tests/troica.postman_environment.json \
            --env-var "baseUrl=${{ secrets.BASE_URL }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export e2e-report.html \
            --reporter-htmlextra-title "E2E triggered by ${{ github.event.client_payload.service || 'unknown' }}"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.event.client_payload.service || 'manual' }}-${{ github.run_id }}
          path: e2e-report.html
          retention-days: 7
